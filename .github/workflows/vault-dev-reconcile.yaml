name: Vault Dev Reconcile

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "infra/vault-transit/base/**"
      - "infra/vault-transit/overlays/dev/**"
      - "apps/auth-server/base/**"
      - "apps/auth-server/overlays/dev/**"
      - "infra/platform/base/**"
      - "infra/platform/overlays/dev/**"
      - "argocd/applications/dev/**"
      - "argocd/projects/dev/**"
      - "runbooks/vault-transit/dev/**"
      - "runbooks/vault/dev/**"
      - "scripts/vault-transit/dev/**"
      - "scripts/vault/dev/**"
      - "terraform/**"
      - ".github/workflows/vault-dev-reconcile.yaml"

concurrency:
  group: vault-dev-reconcile
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  reconcile:
    runs-on:
      - self-hosted
      - linux
    environment: dev
    permissions:
      contents: read

    env:
      TF_IN_AUTOMATION: "true"
      TF_STATE_DIR: ${{ github.workspace }}/.terraform-state
      TRANSIT_VAULT_ADDR: http://127.0.0.1:18200
      WORKLOAD_VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TRANSIT_DEV_ROLE_ID: ${{ secrets.VAULT_TRANSIT_DEV_ROLE_ID }}
      VAULT_TRANSIT_DEV_SECRET_ID: ${{ secrets.VAULT_TRANSIT_DEV_SECRET_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          clean: false

      - name: Validate required tools
        run: |
          for cmd in kubectl vault jq base64 curl terraform; do
            if ! command -v "$cmd" >/dev/null 2>&1; then
              echo "$cmd is required on the self-hosted runner" >&2
              exit 1
            fi
          done

      - name: Configure kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_DEV_B64 }}
        run: |
          if [[ -z "${KUBECONFIG_B64:-}" ]]; then
            echo "KUBECONFIG_DEV_B64 secret is required" >&2
            exit 1
          fi

          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Reconcile dev Vaults and apply Argo CD definitions
        run: |
          mkdir -p "$TF_STATE_DIR"

          ./scripts/vault/dev/apply-argocd-dev-infra.sh

          for _ in $(seq 1 60); do
            if kubectl -n vault-transit get deploy/vault-transit >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          if ! kubectl -n vault-transit get deploy/vault-transit >/dev/null 2>&1; then
            echo "vault-transit deployment did not appear after applying Argo CD infra definitions" >&2
            exit 1
          fi

          kubectl -n vault-transit rollout status deploy/vault-transit --timeout=180s

          kubectl -n vault-transit port-forward svc/vault-transit 18200:8200 >/tmp/vault-transit-port-forward.log 2>&1 &
          transit_pf_pid=$!
          trap 'kill "$transit_pf_pid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "${TRANSIT_VAULT_ADDR}/v1/sys/health" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS "${TRANSIT_VAULT_ADDR}/v1/sys/health" >/dev/null 2>&1; then
            cat /tmp/vault-transit-port-forward.log >&2 || true
            echo "Transit provider Vault API is not reachable through port-forward" >&2
            exit 1
          fi

          VAULT_ADDR="${TRANSIT_VAULT_ADDR}" ./scripts/vault-transit/dev/ensure-unsealed.sh

          transit_tf_token="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
              vault write -field=token auth/approle/login \
                role_id="$VAULT_TRANSIT_DEV_ROLE_ID" \
                secret_id="$VAULT_TRANSIT_DEV_SECRET_ID"
          )"

          VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
          VAULT_TOKEN="${transit_tf_token}" \
            vault policy write \
              vault-transit-automation-dev \
              runbooks/vault-transit/dev/policies/vault-transit-automation-dev.hcl

          transit_tf_token="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
              vault write -field=token auth/approle/login \
                role_id="$VAULT_TRANSIT_DEV_ROLE_ID" \
                secret_id="$VAULT_TRANSIT_DEV_SECRET_ID"
          )"

          transit_state_path="${TF_STATE_DIR}/vault-transit-dev.tfstate"

          TF_VAR_vault_addr="${TRANSIT_VAULT_ADDR}" \
          TF_VAR_vault_token="${transit_tf_token}" \
            terraform -chdir=terraform/vault-transit/dev init \
              -input=false \
              -reconfigure \
              -backend-config="path=${transit_state_path}"

          if ! terraform -chdir=terraform/vault-transit/dev state list >/dev/null 2>&1; then
            echo "vault-transit Terraform state is unreadable. Re-seed ${transit_state_path}." >&2
            exit 1
          fi

          export TF_VAR_vault_addr="${TRANSIT_VAULT_ADDR}"
          export TF_VAR_vault_token="${transit_tf_token}"

          ensure_transit_state_resource() {
            local address="$1"
            local import_id="$2"

            if ! terraform -chdir=terraform/vault-transit/dev state show "$address" >/dev/null 2>&1; then
              echo "Importing missing vault-transit state for ${address}..." >&2
              terraform -chdir=terraform/vault-transit/dev import "$address" "$import_id"
            fi
          }

          workflow_secret_accessor="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
            VAULT_TOKEN="${transit_tf_token}" \
              vault write -field=secret_id_accessor \
                "auth/approle/role/vault-transit-dev-workflow/secret-id/lookup" \
                secret_id="${VAULT_TRANSIT_DEV_SECRET_ID}"
          )"

          seal_token="$(
            kubectl -n vault get secret vault-transit-seal -o jsonpath='{.data.VAULT_TRANSIT_SEAL_TOKEN}' | base64 -d
          )"

          if [[ -z "${seal_token}" ]]; then
            echo "vault-transit-seal secret exists but VAULT_TRANSIT_SEAL_TOKEN is empty." >&2
            exit 1
          fi

          seal_accessor="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
            VAULT_TOKEN="${seal_token}" \
              vault token lookup -format=json | jq -r '.data.accessor'
          )"

          ensure_transit_state_resource kubernetes_secret_v1.vault_transit_seal vault/vault-transit-seal
          ensure_transit_state_resource vault_mount.kv kv
          ensure_transit_state_resource vault_mount.transit transit
          ensure_transit_state_resource vault_policy.workload_vault_transit_dev workload-vault-transit-dev
          ensure_transit_state_resource vault_policy.vault_transit_admin_dev vault-transit-admin-dev
          ensure_transit_state_resource vault_policy.vault_transit_automation_dev vault-transit-automation-dev
          ensure_transit_state_resource vault_auth_backend.approle approle
          ensure_transit_state_resource vault_approle_auth_backend_role.workflow auth/approle/role/vault-transit-dev-workflow
          ensure_transit_state_resource "vault_approle_auth_backend_role_secret_id.workflow" "backend=approle::role=vault-transit-dev-workflow::accessor=${workflow_secret_accessor}"
          ensure_transit_state_resource vault_token.seal "${seal_accessor}"
          ensure_transit_state_resource vault_transit_secret_backend_key.workload_unseal transit/keys/workload-vault-dev-unseal

          TF_VAR_vault_addr="${TRANSIT_VAULT_ADDR}" \
          TF_VAR_vault_token="${transit_tf_token}" \
            terraform -chdir=terraform/vault-transit/dev apply -input=false -auto-approve

          for _ in $(seq 1 60); do
            if kubectl -n vault get deploy/vault >/dev/null 2>&1; then
              break
            fi
            sleep 5
          done

          if ! kubectl -n vault get deploy/vault >/dev/null 2>&1; then
            echo "workload vault deployment did not appear after transit bootstrap" >&2
            exit 1
          fi

          kubectl -n vault rollout status deploy/vault --timeout=180s

          kubectl -n vault port-forward svc/vault 8200:8200 >/tmp/vault-workload-port-forward.log 2>&1 &
          workload_pf_pid=$!
          trap 'kill "$workload_pf_pid" >/dev/null 2>&1 || true; kill "$transit_pf_pid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS "${WORKLOAD_VAULT_ADDR}/v1/sys/health" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! curl -fsS "${WORKLOAD_VAULT_ADDR}/v1/sys/health" >/dev/null 2>&1; then
            cat /tmp/vault-workload-port-forward.log >&2 || true
            echo "Workload Vault API is not reachable through port-forward" >&2
            exit 1
          fi

          VAULT_ADDR="${WORKLOAD_VAULT_ADDR}" ./scripts/vault/dev/ensure-unsealed.sh

          workload_role_id="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
            VAULT_TOKEN="${transit_tf_token}" \
              vault kv get -field=VAULT_WORKLOAD_DEV_ROLE_ID kv/dev/workload/bootstrap 2>/dev/null || true
          )"

          workload_secret_id="$(
            VAULT_ADDR="${TRANSIT_VAULT_ADDR}" \
            VAULT_TOKEN="${transit_tf_token}" \
              vault kv get -field=VAULT_WORKLOAD_DEV_SECRET_ID kv/dev/workload/bootstrap 2>/dev/null || true
          )"

          if [[ -z "${workload_role_id}" || -z "${workload_secret_id}" ]]; then
            echo "Workload Vault workflow AppRole bootstrap values are missing from provider Vault." >&2
            echo "Run terraform/vault/dev once with a privileged workload token to seed kv/dev/workload/bootstrap." >&2
            exit 1
          fi

          workload_tf_token="$(
            VAULT_ADDR="${WORKLOAD_VAULT_ADDR}" \
              vault write -field=token auth/approle/login \
                role_id="${workload_role_id}" \
                secret_id="${workload_secret_id}"
          )"

          workload_state_path="${TF_STATE_DIR}/vault-dev.tfstate"

          TF_VAR_workload_vault_addr="${WORKLOAD_VAULT_ADDR}" \
          TF_VAR_workload_vault_token="${workload_tf_token}" \
          TF_VAR_transit_vault_addr="${TRANSIT_VAULT_ADDR}" \
          TF_VAR_transit_vault_token="${transit_tf_token}" \
            terraform -chdir=terraform/vault/dev init \
              -input=false \
              -reconfigure \
              -backend-config="path=${workload_state_path}"

          export TF_VAR_workload_vault_addr="${WORKLOAD_VAULT_ADDR}"
          export TF_VAR_workload_vault_token="${workload_tf_token}"
          export TF_VAR_transit_vault_addr="${TRANSIT_VAULT_ADDR}"
          export TF_VAR_transit_vault_token="${transit_tf_token}"

          ensure_workload_state_resource() {
            local address="$1"
            local import_id="$2"

            if ! terraform -chdir=terraform/vault/dev state show "$address" >/dev/null 2>&1; then
              echo "Importing missing workload-vault state for ${address}..." >&2
              terraform -chdir=terraform/vault/dev import "$address" "$import_id"
            fi
          }

          workload_secret_accessor="$(
            VAULT_ADDR="${WORKLOAD_VAULT_ADDR}" \
            VAULT_TOKEN="${workload_tf_token}" \
              vault write -field=secret_id_accessor \
                "auth/approle/role/workload-dev-workflow/secret-id/lookup" \
                secret_id="${workload_secret_id}"
          )"

          ensure_workload_state_resource vault_mount.kv kv
          ensure_workload_state_resource vault_mount.database database
          ensure_workload_state_resource vault_mount.transit transit
          ensure_workload_state_resource vault_auth_backend.kubernetes kubernetes
          ensure_workload_state_resource vault_kubernetes_auth_backend_config.cluster auth/kubernetes/config
          ensure_workload_state_resource vault_auth_backend.approle approle
          ensure_workload_state_resource vault_policy.auth_server auth-server-dev
          ensure_workload_state_resource vault_policy.auth_db_migration auth-db-migration-dev
          ensure_workload_state_resource vault_policy.postgres postgres-dev
          ensure_workload_state_resource vault_policy.keycloak keycloak-dev
          ensure_workload_state_resource vault_policy.keycloak_client_sync keycloak-client-sync-dev
          ensure_workload_state_resource vault_policy.postgres_operator postgres-operator-dev
          ensure_workload_state_resource vault_policy.keycloak_operator keycloak-operator-dev
          ensure_workload_state_resource vault_policy.platform_admin platform-admin-dev
          ensure_workload_state_resource vault_policy.workload_automation workload-automation-dev
          ensure_workload_state_resource vault_kubernetes_auth_backend_role.auth_server auth/kubernetes/role/auth-server-dev
          ensure_workload_state_resource vault_kubernetes_auth_backend_role.auth_db_migration auth/kubernetes/role/auth-db-migration-dev
          ensure_workload_state_resource vault_kubernetes_auth_backend_role.postgres auth/kubernetes/role/postgres-dev
          ensure_workload_state_resource vault_kubernetes_auth_backend_role.keycloak auth/kubernetes/role/keycloak-dev
          ensure_workload_state_resource vault_kubernetes_auth_backend_role.keycloak_client_sync auth/kubernetes/role/keycloak-client-sync-dev
          ensure_workload_state_resource vault_transit_secret_backend_key.project_auth_jwt transit/keys/project-auth-jwt
          ensure_workload_state_resource vault_approle_auth_backend_role.workflow auth/approle/role/workload-dev-workflow
          ensure_workload_state_resource "vault_approle_auth_backend_role_secret_id.workflow" "backend=approle::role=workload-dev-workflow::accessor=${workload_secret_accessor}"
          ensure_workload_state_resource vault_database_secret_backend_connection.platform_postgres database/config/platform-postgres-dev
          ensure_workload_state_resource vault_database_secret_backend_role.auth_db_migration database/roles/auth-db-migration-dev
          ensure_workload_state_resource vault_database_secret_backend_role.postgres_operator database/roles/postgres-operator-dev
          ensure_workload_state_resource vault_kv_secret_v2.platform_postgres_superuser kv/data/dev/platform/postgres/superuser
          ensure_workload_state_resource vault_kv_secret_v2.platform_postgres_auth_server kv/data/dev/platform/postgres/auth-server
          ensure_workload_state_resource vault_kv_secret_v2.platform_postgres_keycloak kv/data/dev/platform/postgres/keycloak
          ensure_workload_state_resource vault_kv_secret_v2.platform_keycloak_bootstrap_admin kv/data/dev/platform/keycloak/bootstrap-admin
          ensure_workload_state_resource vault_kv_secret_v2.platform_keycloak_client_auth_server kv/data/dev/platform/keycloak/client-auth-server
          ensure_workload_state_resource vault_kv_secret_v2.workload_bootstrap kv/data/dev/workload/bootstrap

          TF_VAR_workload_vault_addr="${WORKLOAD_VAULT_ADDR}" \
          TF_VAR_workload_vault_token="${workload_tf_token}" \
          TF_VAR_transit_vault_addr="${TRANSIT_VAULT_ADDR}" \
          TF_VAR_transit_vault_token="${transit_tf_token}" \
            terraform -chdir=terraform/vault/dev apply -input=false -auto-approve

          for _ in $(seq 1 30); do
            injector_deployment="$(kubectl -n vault get deployment -l app.kubernetes.io/name=vault-agent-injector -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
            if [[ -n "$injector_deployment" ]]; then
              kubectl -n vault rollout status "deployment/${injector_deployment}" --timeout=180s
              break
            fi
            sleep 5
          done

          ./scripts/vault/dev/apply-argocd-dev-apps.sh
