apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-server
  annotations:
    argocd.argoproj.io/sync-wave: "0"

spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-server
  
  template:
    metadata:
      labels:
        app: auth-server
  
    spec:
      serviceAccountName: auth-server
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-server
          image: ghcr.io/donghyeonka/project-auth-server
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: auth-server-config
            - secretRef:
                name: postgres-auth-server-credentials
            - secretRef:
                name: keycloak-client-auth-server
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 12
